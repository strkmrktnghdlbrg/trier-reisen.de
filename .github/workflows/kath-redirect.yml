name: Kath-Akademie Redirect (manual)

# Manuell ausloesbar. mode=inspect (Standard) listet nur die Kontostruktur
# und sucht den kath-akademie-trier.de-Docroot. mode=place legt die catch-all
# 301-.htaccess NUR dann ab, wenn ein Ordner gefunden wird, dessen Name
# "kath-akademie" enthaelt (und niemals in einem trier-reisen-Pfad).
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "inspect (nur suchen) oder place (htaccess ablegen)"
        required: true
        default: "inspect"
        type: choice
        options: [inspect, place]

jobs:
  kath-redirect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: SSH inspect / place
        uses: appleboy/ssh-action@v1.0.3
        env:
          MODE: ${{ inputs.mode }}
          HT_B64: ""
        with:
          host: nl1-ts109.a2hosting.com
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: MODE,HT_B64
          script: |
            set -e
            echo "===== MODE: $MODE ====="
            echo "===== HOME ($HOME) ====="
            ls -la "$HOME" | grep '^d' || true
            echo "===== public_html (eine Ebene) ====="
            ls -la "$HOME/public_html" 2>/dev/null | grep '^d' || echo "(kein public_html)"
            echo "===== Suche nach *kath* Verzeichnissen (max Tiefe 3) ====="
            find "$HOME" -maxdepth 3 -type d -iname '*kath*' 2>/dev/null || true
            echo "===== cPanel Addon-/Docroot-Hinweise ====="
            grep -riE 'kath-akademie' "$HOME/.cpanel" 2>/dev/null | head -20 || echo "(keine .cpanel-Treffer)"

            # Kandidaten-Docroot bestimmen: erster *kath-akademie* Ordner, der NICHT
            # zu trier-reisen gehoert.
            CAND="$(find "$HOME" -maxdepth 3 -type d -iname '*kath-akademie*' 2>/dev/null | grep -vi 'trier-reisen' | head -1 || true)"
            echo "===== Kandidat-Docroot: '${CAND:-<keiner>}' ====="

            if [ "$MODE" = "place" ]; then
              if [ -z "$CAND" ]; then
                echo "ABBRUCH: Kein kath-akademie-Docroot gefunden. Es wurde NICHTS geschrieben."
                exit 1
              fi
              case "$CAND" in
                *trier-reisen*) echo "SICHERHEITS-ABBRUCH: Pfad enthaelt trier-reisen. Kein Schreiben."; exit 1 ;;
              esac
              echo "===== Inhalt Ziel-Docroot VOR dem Schreiben ====="
              ls -la "$CAND"
              if [ -f "$CAND/.htaccess" ]; then
                echo "===== Vorhandene .htaccess -> Backup .htaccess.bak-kath ====="
                cp -p "$CAND/.htaccess" "$CAND/.htaccess.bak-kath"
              fi
              echo "$HT_B64" | base64 -d > "$CAND/.htaccess"
              chmod 644 "$CAND/.htaccess"
              echo "===== GESCHRIEBEN nach $CAND/.htaccess ====="
              cat "$CAND/.htaccess"
            else
              echo "Inspect-Modus: keine Aenderung vorgenommen."
            fi
