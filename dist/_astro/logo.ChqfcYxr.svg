<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" role="img" aria-label="Trier-Reisen">
  <title>Trier-Reisen — Stadtportal Trier</title>
  <!-- Porta-Nigra-Bildmarke (geometrische Silhouette: zwei Stockwerke + Bogen) -->
  <g fill="currentColor">
    <!-- Sockel -->
    <rect x="2" y="52" width="48" height="6"/>
    <!-- Erdgeschoss mit grossem Rundbogen -->
    <path d="M2 36 H50 V52 H2 Z M16 52 V44 a10 10 0 0 1 20 0 V52 Z" fill-rule="evenodd"/>
    <!-- Obergeschoss mit zwei Rundbogenfenstern -->
    <path d="M6 20 H46 V36 H6 Z M14 36 V30 a4 4 0 0 1 8 0 V36 Z M30 36 V30 a4 4 0 0 1 8 0 V36 Z" fill-rule="evenodd"/>
    <!-- Zinnenkrone -->
    <path d="M6 12 H10 V20 H6 Z M14 12 H18 V20 H14 Z M22 12 H26 V20 H22 Z M30 12 H34 V20 H30 Z M38 12 H42 V20 H38 Z"/>
  </g>
  <!-- Wordmark: "Trier" Cormorant 300 + "REISEN" Inter caption -->
  <text x="64" y="38" font-family="Cormorant Garamond, Cormorant, Garamond, serif" font-weight="300" font-size="32" letter-spacing="-0.5" fill="#000">Trier</text>
  <text x="64" y="54" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="11" letter-spacing="3" fill="currentColor">REISEN</text>
</svg>
